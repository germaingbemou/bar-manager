<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Manager — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f0f11; --bg2: #16161a; --bg3: #1e1e24;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0; --text2: #9090a8; --text3: #5a5a72;
    --accent: #6ee7b7; --danger: #f87171;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 380px; }
  .login-logo { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .login-sub { font-size: 11px; color: var(--accent); font-family: var(--mono); margin-bottom: 28px; }
  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .fg label { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
  .fg input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 10px 12px; outline: none; transition: border-color .15s; }
  .fg input:focus { border-color: rgba(110,231,183,0.4); }
  .btn-login { width: 100%; padding: 11px; background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.3); border-radius: 8px; color: var(--accent); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; margin-top: 6px; }
  .btn-login:hover { background: rgba(110,231,183,0.15); }
  .error-msg { font-size: 11px; color: var(--danger); font-family: var(--mono); margin-top: 10px; text-align: center; min-height: 16px; }
  .loading { opacity: .6; pointer-events: none; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f11">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bar Manager">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="login-box">
  <div class="login-logo">Bar Manager</div>
  <div class="login-sub">v3.0 · Connexion requise</div>
  <div class="fg">
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
  </div>
  <div class="fg">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btn-login" onclick="login()">Se connecter</button>
  <div class="error-msg" id="error-msg"></div>
</div>
<script>
const SUPABASE_URL = 'https://yhygidfyssfgxljbtlmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KyUpAkclg-xjqMLjSvftIA_oJrJyefV';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');
  if (!email || !password) { err.textContent = 'Remplissez tous les champs'; return; }
  btn.classList.add('loading');
  btn.textContent = 'Connexion...';
  err.textContent = '';
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.href = 'app.html';
  } catch(e) {
    err.textContent = 'Email ou mot de passe incorrect';
    btn.classList.remove('loading');
    btn.textContent = 'Se connecter';
  }
}

// Si deja connecte, rediriger
db.auth.getSession().then(function(r) {
  if (r.data.session) window.location.href = 'app.html';
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(e){console.log('SW:', e);});
  });
}
</script>
</body>
</html>
